# Netlify configuration for PagaFácil Frontend
[build]
  base    = "frontend"
  publish = "."
  command = "echo 'Static site ready'"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    X-Frame-Options              = "SAMEORIGIN"
    X-XSS-Protection             = "1; mode=block"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
