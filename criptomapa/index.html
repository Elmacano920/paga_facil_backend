<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CriptoMapa Venezuela — Directorio Cripto</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">₿ CriptoMapa</div>
    <span class="logo-sub">Directorio cripto Venezuela</span>
    <button id="btn-escanear" onclick="abrirEscaner()" style="margin-left:auto;background:#f59e0b;color:#000;border:none;padding:6px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">📷 Escanear QR</button>
  </header>

  <!-- BARRA DE FILTROS -->
  <div class="filtros">
    <select id="filtro-red">
      <option value="">Todas las redes</option>
      <option value="TRC-20">TRC-20 (Tron)</option>
      <option value="BEP-20">BEP-20 (BSC)</option>
      <option value="Lightning">Lightning (BTC)</option>
    </select>

    <select id="filtro-moneda">
      <option value="">Todas las monedas</option>
      <option value="USDT">USDT</option>
      <option value="USDC">USDC</option>
      <option value="BTC">BTC</option>
      <option value="BNB">BNB</option>
    </select>

    <select id="filtro-radio">
      <option value="1">1 km</option>
      <option value="3">3 km</option>
      <option value="5" selected>5 km</option>
      <option value="10">10 km</option>
      <option value="0">Sin límite</option>
    </select>

    <button id="btn-ubicacion">📍 Mi ubicación</button>

    <span class="contador-wrap">
      <span id="contador">0</span> encontrados
    </span>
  </div>

  <!-- LAYOUT -->
  <div class="layout">
    <div id="mapa"></div>

    <aside class="panel">
      <div class="panel-titulo">Comercios cercanos</div>
      <ul id="lista" role="list">
        <li class="hint">Activa tu ubicación para ver comercios cercanos</li>
      </ul>
    </aside>
  </div>

  <!-- MODAL DETALLE + PAGO -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box" style="max-width:520px">
      <button id="modal-cerrar" class="modal-cerrar">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- MODAL ESCANER QR -->
  <div id="modal-scan" class="modal hidden" role="dialog">
    <div class="modal-box" style="max-width:420px;text-align:center">
      <button onclick="cerrarEscaner()" class="modal-cerrar">✕</button>
      <h3 style="margin:0 0 12px;color:#f59e0b">📷 Escanear QR de Pago</h3>
      <div id="qr-reader" style="width:100%;border-radius:10px;overflow:hidden"></div>
      <p id="scan-result" style="margin-top:12px;font-size:.8rem;color:#94a3b8">Apunta la cámara al código QR del comercio</p>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#10b981;color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;transition:transform .3s;z-index:9999;pointer-events:none"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- QR Generator -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
